# Alembic 数据库迁移配置
# 文档: https://alembic.sqlalchemy.org/en/latest/config.html

[alembic]
# 迁移脚本存放路径
# %(here)s 指向 alembic.ini 所在目录 (apps/api/)
# alembic 目录在 app/alembic，所以需要指向 app/alembic
script_location = %(here)s/app/alembic

# 模板配置：迁移文件名格式
# 默认格式: %%(rev)s_%%(slug)s
# 可选：添加日期前缀
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Python 路径配置
# 添加当前目录到 Python 路径，确保可以导入 app 模块
# 从 apps/api 目录运行时，. 指向 apps/api，可以导入 app
prepend_sys_path = .

# 版本路径分隔符
version_path_separator = os

# 路径分隔符
path_separator = os

# 数据库 URL - 从环境变量读取，由 env.py 动态设置
# 注意：这里使用占位符，实际 URL 在 env.py 中从 .env 文件加载
sqlalchemy.url = postgresql+asyncpg://postgres:postgres123@localhost:5432/appdb

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
