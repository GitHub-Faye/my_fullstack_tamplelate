services:
  postgres:
    image: postgres:16-alpine
    container_name: app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: app-redis
    restart: unless-stopped
    command: redis-server --requirepass redis123 --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
# ==================== Celery Worker（必须添加） ====================
  celery-worker:
    build: .
    container_name: app-celery-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --pool=solo
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://:redis123@redis:6379/0
      CELERY_BROKER_URL: redis://:redis123@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:redis123@redis:6379/1

  # ==================== Flower（强烈推荐添加，用于监控 Celery 任务） ====================
  flower:
    build: .
    container_name: app-flower
    restart: unless-stopped
    command: celery -A app.tasks.celery_app flower --port=5555 --broker=redis://:redis123@redis:6379/0
    ports:
      - "5555:5555"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    environment:
      REDIS_URL: redis://:redis123@redis:6379/0
      CELERY_BROKER_URL: redis://:redis123@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:redis123@redis:6379/1
      PYTHONPATH: /app
  # ==================== 新增 Adminer 可视化工具 ====================
  adminer:
    image: adminer:latest
    container_name: app-adminer
    restart: unless-stopped
    ports:
      - "8088:8080"          # 浏览器访问地址：http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 可选：让 Adminer 默认使用 PostgreSQL
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DEFAULT_DB: appdb
    # networks:  # 如果你后面加了自定义网络，可以在这里加入

volumes:
  postgres_data:
  redis_data: