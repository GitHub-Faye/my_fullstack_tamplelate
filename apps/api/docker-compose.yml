version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: app-redis
    restart: unless-stopped
    command: redis-server --requirepass redis123 --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # ==================== 新增：RabbitMQ（作为 Celery Broker） ====================
  rabbitmq:
    image: rabbitmq:4-management   # 带 Web 管理界面（推荐）
    container_name: app-rabbitmq
    restart: unless-stopped
    hostname: rabbitmq
    ports:
      - "5672:5672"    # AMQP 端口（Celery 连接用）
      - "15672:15672"  # 管理界面端口（浏览器访问）
    environment:
      RABBITMQ_DEFAULT_USER: celery_user      # 自定义用户（不要用 guest 生产）
      RABBITMQ_DEFAULT_PASS: celery123        # 生产请改成强密码
      RABBITMQ_DEFAULT_VHOST: celery_vhost    # 独立虚拟主机（推荐）
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== Celery Worker ====================
  celery-worker:
    build: .
    container_name: app-celery-worker
    restart: unless-stopped
    # 修改为下面这行（去掉 --pool=gevent，推荐加上 --concurrency）
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://:redis123@redis:6379/0
      CELERY_BROKER_URL: amqp://celery_user:celery123@rabbitmq:5672/celery_vhost
      CELERY_RESULT_BACKEND: redis://:redis123@redis:6379/1
      PYTHONPATH: /app

  # ==================== Flower（监控 Celery） ====================
  flower:
    build: .
    container_name: app-flower
    restart: unless-stopped
    command: celery -A app.tasks.celery_app flower --port=5555 --broker=amqp://celery_user:celery123@rabbitmq:5672/celery_vhost
    ports:
      - "5555:5555"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    environment:
      REDIS_URL: redis://:redis123@redis:6379/0
      CELERY_BROKER_URL: amqp://celery_user:celery123@rabbitmq:5672/celery_vhost
      CELERY_RESULT_BACKEND: redis://:redis123@redis:6379/1
      PYTHONPATH: /app

  # ==================== Adminer（数据库可视化） ====================
  adminer:
    image: adminer:latest
    container_name: app-adminer
    restart: unless-stopped
    ports:
      - "8088:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DEFAULT_DB: appdb

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:     # 新增 RabbitMQ 数据持久化卷